<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💎 Ta phrase positive du jour</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#d8e2dc,#84a98c);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:white;
    width:90%;
    max-width:500px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    border:2px solid #8B5A2B;
}

h1{
    color:#8B5A2B;
    font-size:36px;
}

#phrase{
    font-size:22px;
    line-height:1.6;
    margin:35px 0;
    color:#000;
    min-height:120px;
}

button{
    background:#8B5A2B;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:50px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    background:#6F4E37;
    transform:scale(1.05);
}

footer{
    margin-top:30px;
    color:#000;
    font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<h1>💎 Ta phrase positive du jour</h1>

<div id="phrase">
Clique sur le bouton ☀️
</div>

<button onclick="nouvellePhrase()">
☀️ Découvrir ma phrase
</button>

<footer>
Reviens chaque jour ❤️
</footer>

</div>

<script>

const phrases=[

"Tu es exactement là où tu dois être.",

"Le meilleur reste à venir.",

"Tu es plus fort que tu ne le crois.",

"Chaque petit pas compte.",

"Aujourd'hui est rempli de possibilités.",

"Tu mérites d'être heureux.",

"Crois en toi.",

"Le bonheur commence avec une pensée positive.",

"Respire. Tu vas y arriver.",

"Tu illumines plus de vies que tu ne l'imagines.",

"N'abandonne jamais tes rêves.",

"La patience est aussi une forme de courage.",

"Tu as déjà traversé des moments difficiles : tu peux avancer encore.",

"Choisis la joie aujourd'hui.",

"Fais-toi confiance."

"Je possède déjà en moi les ressources dont j'ai besoin."

"Chaque petit pas me rapproche de mes objectifs."

"Je mérite le respect, l'amour et la bienveillance."

"Je suis capable d'apprendre tout ce que je décide de comprendre."

"Mon potentiel est bien plus grand que mes doutes."

"Je choisis de voir les possibilités plutôt que les obstacles."

"Je progresse chaque jour, même lorsque cela ne se voit pas immédiatement."

"Je peux être fier de tout le chemin que j'ai déjà parcouru."

"Mon courage grandit à chaque défi relevé."

"Je suis une personne précieuse et unique."

"Ma valeur ne dépend pas du regard des autres."

"Je fais de mon mieux, et cela est déjà remarquable."

"Je développe ma confiance un peu plus chaque jour."

"Je suis plus fort que les pensées qui cherchent à me limiter."

"Je mérite de vivre une vie épanouissante."

"Mon avenir peut être encore plus beau que mon passé."

"J'accueille les changements avec confiance."

"Je suis capable de trouver des solutions."

"J'ai le droit de réussir."

"J'ai le droit d'être heureux."

"Mon sourire est une force qui illumine ma journée."

"Je m'autorise à croire en moi."

"Je suis fier de mes efforts."

"Je mérite les belles choses qui arrivent dans ma vie."

"Mon énergie positive attire de belles opportunités."

"Je suis libre de devenir la meilleure version de moi-même."

"Mes erreurs ne définissent pas qui je suis."

"Mon esprit devient chaque jour plus fort et plus serein."

"Je fais confiance à ma capacité d'évoluer."

"Je suis entouré de possibilités."

"Je crée aujourd'hui les réussites de demain."

"Je mérite de prendre soin de moi."

"Je suis compétent."

"Chaque respiration me remplit d'énergie positive."

"Je peux influencer positivement mon avenir."

"Je choisis de croire en mes capacités."

"Je suis capable de réaliser de grandes choses avec patience."

"Chaque victoire, même petite, mérite d'être célébrée."

"Aujourd'hui, je décide d'avancer avec optimisme et détermination."
];

function nouvellePhrase(){

const hasard=Math.floor(Math.random()*phrases.length);

document.getElementById("phrase").innerHTML=
"❤️<br><br><strong>"+phrases[hasard]+"</strong>";

}

</script>

</body>
</html>
